<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorio de Proyectiles V1</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="sim-container">
      <canvas id="simCanvas" width="800" height="500"></canvas>

      <div class="controls">
        <h2>Panel de Control</h2>

        <div class="control-group">
          <label for="angle"
            >Ángulo (grados): <span id="angleValue">45</span>°</label
          >
          <input type="range" id="angle" min="0" max="90" value="45" />
        </div>

        <div class="control-group">
          <label for="velocity"
            >Velocidad Inicial (m/s):
            <span id="velocityValue">50</span> m/s</label
          >
          <input type="range" id="velocity" min="1" max="100" value="50" />
        </div>

        <button id="launchButton">Lanzar Proyectil</button>
      </div>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>
