<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SahaHacking | Proyectil - Nivel 7 (Laboratorio Estadístico)</title>

    <link rel="stylesheet" href="assets/css/proyectil-estilos.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="assets/js/proyectil-main.js" defer></script>
  </head>
  <body>
    <div id="background-gif-container">
      <img
        src="https://i.pinimg.com/originals/21/ee/54/21ee54c4153a4f85d2ab/53dbe2e172b8.gif"
        alt="Fondo animado"
      />
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="config-panel" class="floating-panel" style="display: none">
      <div class="panel-header">
        <h4>Configuración</h4>
        <button class="close-btn" data-panel="config-panel">X</button>
      </div>
      <div class="panel-content">
        <h5>LANZADOR MISTERIOSO</h5>
        <div id="launcher-selector" class="button-grid">
          <button class="grid-btn active" data-launcher-id="0">1</button>
          <button class="grid-btn" data-launcher-id="1">2</button>
          <button class="grid-btn" data-launcher-id="2">3</button>
          <button class="grid-btn" data-launcher-id="3">4</button>
          <button class="grid-btn" data-launcher-id="4">5</button>
          <button class="grid-btn" data-launcher-id="5">6</button>
        </div>
        <div id="launcher-info">
          Nombre: Catapult, V. base: 22 m/s, Variabilidad: 1.8 m/s
        </div>

        <h5>VISUALIZACIÓN</h5>
        <label>
          <input type="checkbox" id="follow-checkbox" checked />
          Seguir Proyectil
        </label>
      </div>
    </div>

    <div
      id="histogram-panel"
      class="floating-panel"
      style="right: 20px; display: none"
    >
      <div class="panel-header">
        <h4>Histograma</h4>
        <button class="close-btn" data-panel="histogram-panel">X</button>
      </div>
      <div class="panel-content">
        <canvas id="histogramChart"></canvas>
        <p>Datos: <span id="data-count">0</span> disparos</p>
        <button id="clear-data-btn">Borrar Datos</button>
      </div>
    </div>

    <div class="hud-bar">
      <button id="fireButton" class="hud-button fire">Disparar</button>
      <button class="hud-button" data-panel="config-panel">Config (C)</button>
      <button class="hud-button" data-panel="histogram-panel">
        Histograma (H)
      </button>
    </div>
  </body>
</html>
