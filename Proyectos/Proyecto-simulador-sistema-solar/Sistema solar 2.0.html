<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Explorador del Sistema Solar - Modo Nave</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="hud">
      <div id="topBar">
        <div id="gameTitle">⬡ EXPLORADOR ESPACIAL ⬡</div>
        <div id="shipStatus">
          <div>ESTADO: <span id="statusText">EN ÓRBITA</span></div>
          <div>VELOCIDAD: <span id="speedText">0 km/s</span></div>
        </div>
      </div>

      <div id="navPanel">
        <div class="panel-title">▸ NAVEGACIÓN PLANETARIA</div>
        <button class="nav-button" onclick="navigateToPlanet('Sol')">
          ☉ SOL - BASE
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Mercurio')">
          ☿ MERCURIO
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Venus')">
          ♀ VENUS
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Tierra')">
          ⊕ TIERRA
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Marte')">
          ♂ MARTE
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Júpiter')">
          ♃ JÚPITER
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Saturno')">
          ♄ SATURNO
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Urano')">
          ♅ URANO
        </button>
        <button class="nav-button" onclick="navigateToPlanet('Neptuno')">
          ♆ NEPTUNO
        </button>
      </div>

      <div id="timeControl">
        <div class="panel-title">▸ CONTROL TEMPORAL</div>
        <div class="time-display"><span id="timeSpeed">1.0</span>x</div>
        <div class="slider-container">
          <input
            type="range"
            class="time-slider"
            id="timeSlider"
            min="0.1"
            max="100"
            value="1"
            step="0.1"
          />
          <div class="time-labels">
            <span>0.1x</span>
            <span>TIEMPO NORMAL</span>
            <span>100x</span>
          </div>
        </div>
        <div
          style="
            text-align: center;
            font-size: 11px;
            margin-top: 10px;
            opacity: 0.7;
          "
        >
          Controla la velocidad del viaje y simulación
        </div>
      </div>

      <div id="travelInfo">
        ► VIAJANDO A <span id="targetPlanet">---</span><br />
        <span id="travelProgress">0%</span> COMPLETADO
      </div>
    </div>

    <div id="canvasWrap"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/main.js" defer></script>
  </body>
</html>
